name: Update Dashboard

on:
  schedule:
    - cron: '0 */5 * * *'   # every 5 hours
  workflow_dispatch:          # lets you click "Run workflow" manually in GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python scripts/generate_dashboard.py

      - name: Commit & push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
